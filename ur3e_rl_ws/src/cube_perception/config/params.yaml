cube_perception:
  ros__parameters:
    # Camera
    input_topic: "/camera/depth/color/points"
    camera_frame: "camera_link"
    world_frame: "base_link"

    # Workspace bounds (metres, in base_link frame)
    # These match constants.py — keep in sync
    workspace_x_min: -0.46
    workspace_x_max: 0.40
    workspace_y_min: -0.56
    workspace_y_max: 0.14
    table_top_z: 1.07
    workspace_z_min: 1.08
    workspace_z_max: 1.22

    # Cube geometry
    cube_edge_m: 0.040

    # RANSAC plane removal
    plane_distance_threshold_m: 0.005
    plane_ransac_n: 3
    plane_num_iterations: 100

    # DBSCAN clustering
    cluster_eps_m: 0.015
    cluster_min_points: 20

    # Cluster size filter
    cluster_size_min: 50
    cluster_size_max: 1200

    # Point-count based confidence thresholds
    full_cube_points_min: 300
    full_cube_points_max: 900
    occluded_cube_points_min: 50

    # Tracker
    max_cubes: 4
    tracker_max_distance_m: 0.08
    tracker_max_missing_frames: 15
    tracker_confidence_decay: 0.85
    tracker_min_publish_confidence: 0.2

    # Output
    publish_rate_hz: 10.0
    publish_debug_cloud: true
    publish_markers: true
